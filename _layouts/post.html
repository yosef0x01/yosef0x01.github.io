---
layout: default
---

<article class="post">

  <header class="post-header">
    <div class="post-meta-top">
      {% for tag in page.tags %}
      <span class="tag tag-{{ tag | downcase | replace: ' ', '-' }}">{{ tag }}</span>
      {% endfor %}
      <span class="post-date">{{ page.date | date: "%B %d, %Y" }}</span>
    </div>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.cvss %}
    <div class="cvss-badge">CVSS <strong>{{ page.cvss }}</strong></div>
    {% endif %}
  </header>

  <div class="post-divider"></div>

  <div class="post-body">
    {{ content }}
  </div>

  <div class="post-divider"></div>

  <footer class="post-footer">
    <a href="{{ '/' | relative_url }}" class="back-link">← Back</a>
    <div class="post-tags-footer">
      {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
    </div>
  </footer>

</article>
